  text: 三察察天地紛紛而多彩物先者有善有治無亂有人焉有不善亂出於人先有中焉有外先有小焉有大先有柔焉有剛先有圓焉有方先有晦焉有明先有短焉有長天地既載唯一以猶一唯復以猶復恒氣之生因復其所欲明明天行唯復以不廢智既而亡思不天
