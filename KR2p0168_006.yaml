body:
  text: 五詳義利主彩物出於作作焉有事不作無事舉天下之事自作為事庸以不可更也凡言名先者有擬妄言之後者校比焉舉天下之名虛屬習以不可改也舉天下之作強者果天下之大作其熾尨不自若作庸有果與不果兩者不廢舉天下之為也無舍也無與也而能自為也舉天下之生同也其事無不復舉天下之作也無忤極無非其所舉天下之作也無不得其恆而果遂庸或得之庸或失之舉天下之名無有廢者舉天下之明王明君明士庸有求而不慮
