body:
  text: 二往者未有天地未有作行出生虛靜為一若寂夢夢靜同而未有明未有滋生氣實自生恆莫生氣氣是自生自作恆氣之生不獨有與也域恆焉生域者同焉昏昏不寧求其所生異生異歸生歸違生違悲生悲依生依求欲自復復生之生行濁氣生地清氣生天氣信神哉藝藝相生信盈天地同出而異性因生其所欲
